x-app-env: &app-env
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/rag_db
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    QDRANT_URL: http://qdrant:6333
    MINIO_ENDPOINT: http://minio:9000

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_db
    ports:
      - "5433:5432"     # host 5433 → container 5432 (avoids conflict with other projects)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6381:6379"     # host 6381 → container 6379 (avoids conflict with local Redis on 6379)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI → http://localhost:15672  (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"     # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # curl is not installed in the qdrant image — use a TCP-level check instead
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"     # host 9002 → container 9000 (avoids conflict with other projects)
      - "9003:9001"     # web console → http://localhost:9003
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/rag-documents;
        exit 0;
      "

  # ── Application ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
    <<: *app-env
    ports:
      - "8000:8000"     # API → http://localhost:8000  (docs at /docs in dev mode)
    volumes:
      - ./backend/secrets:/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
    command: >
      celery -A app.workers.celery_app.celery_app worker
             --loglevel=info -Q ingest -c 4
    <<: *app-env
    volumes:
      - ./backend/secrets:/secrets:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      BACKEND_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
