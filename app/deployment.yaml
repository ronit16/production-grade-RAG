# ─── k8s/deployment.yaml ────────────────────────────────────────────────────
# Production Kubernetes manifests
# Apply: kubectl apply -f infra/k8s/
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: production
  labels:
    app: rag-api
    version: "1.0.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rag-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # zero-downtime deploys
  template:
    metadata:
      labels:
        app: rag-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: your-registry/rag-api:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: rag-secrets
            - configMapRef:
                name: rag-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "10"]  # drain connections before SIGTERM
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker
  namespace: production
spec:
  replicas: 4                        # scale independently from API
  selector:
    matchLabels:
      app: rag-worker
  template:
    metadata:
      labels:
        app: rag-worker
    spec:
      containers:
        - name: worker
          image: your-registry/rag-api:1.0.0
          command:
            - celery
            - -A
            - app.workers.ingestion.celery
            - worker
            - --loglevel=info
            - --concurrency=4
            - -Q
            - ingest
          envFrom:
            - secretRef:
                name: rag-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rag-api-svc
  namespace: production
spec:
  selector:
    app: rag-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
---
# Worker HPA — scale on queue depth (custom metric via KEDA)
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rag-worker-scaler
  namespace: production
spec:
  scaleTargetRef:
    name: rag-worker
  minReplicaCount: 2
  maxReplicaCount: 16
  triggers:
    - type: rabbitmq
      metadata:
        queueName: ingest
        queueLength: "10"        # scale out when queue depth > 10
        host: amqp://guest:guest@rabbitmq:5672//
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
  namespace: production
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"  # for SSE connections
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"     # critical for SSE
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts: [api.yourdomain.com]
      secretName: rag-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rag-api-svc
                port:
                  number: 80
