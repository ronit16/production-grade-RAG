# ─── docker-compose.yml ───────────────────────────────────────────────────────
# Full local development stack
# Usage: docker compose up -d
version: "3.9"
services:

  # ── FastAPI Application ───────────────────────────────────────────────────
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_BUCKET: rag-local
      S3_REGION: us-east-1
    volumes:
      - ./app:/app/app
    depends_on: [postgres, redis, elasticsearch, rabbitmq]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ─────────────────────────────────────────────────────────
  worker:
    build: .
    environment:
      DATABASE_URL: postgresql://rag:rag@postgres:5432/rag
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      S3_BUCKET: rag-local
    depends_on: [postgres, redis, rabbitmq]
    command: celery -A app.workers.ingestion.celery worker --loglevel=info --concurrency=4 -Q ingest

  # ── Celery Flower (monitoring) ────────────────────────────────────────────
  flower:
    build: .
    ports: ["5555:5555"]
    command: celery -A app.workers.ingestion.celery flower
    depends_on: [worker]

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes: [pgdata:/var/lib/postgresql/data]

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes: [esdata:/usr/share/elasticsearch/data]

  # ── RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports: ["5672:5672", "15672:15672"]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  # ── LocalStack (S3 mock) ──────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:latest
    ports: ["4566:4566"]
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
    volumes: [lsdata:/var/lib/localstack]

  # ── Jaeger (distributed tracing) ─────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports: ["16686:16686", "4318:4318"]

  # ── Grafana + Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    ports: ["9090:9090"]
    volumes: [./infra/prometheus.yml:/etc/prometheus/prometheus.yml]

  grafana:
    image: grafana/grafana:10.3.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes: [grafdata:/var/lib/grafana]
    depends_on: [prometheus]

volumes:
  pgdata:
  esdata:
  lsdata:
  grafdata:
